version: 2.1

orbs:
  aws_assume_role: lbh-hackit/aws_assume_role@0.1.1

executors:
  docker-python:
    docker:
      - image: cimg/python:3.7
  docker-terraform:
    docker:
      - image: "hashicorp/terraform:light"
  docker-dotnet:
    docker:
      - image: mcr.microsoft.com/dotnet/sdk:8.0

references:
  workspace_root: &workspace_root "~"
  attach_workspace: &attach_workspace
    attach_workspace:
      at: *workspace_root

commands:
  assume-role-and-persist-workspace:
    description: "Assumes deployment role and persists credentials across jobs"
    parameters:
      aws-account:
        type: string
    steps:
      - checkout
      - aws_assume_role/assume_role:
          account: <<parameters.aws-account>>
          profile_name: default
          role: "LBH_Circle_CI_Deployment_Role"
      - persist_to_workspace:
          root: *workspace_root
          paths:
            - .aws

  terraform-init:
    description: "Initializes Terraform configuration for a specific environment"
    parameters:
      environment:
        type: string
    steps:
      - run:
          name: get and init
          command: |
            cd ./terraform/<<parameters.environment>>/
            terraform get -update=true
            terraform init

  terraform-preview:
    description: "Previews terraform configuration changes"
    parameters:
      environment:
        type: string
    steps:
      - *attach_workspace
      - checkout
      - terraform-init:
          environment: <<parameters.environment>>
      - run:
          name: preview
          command: |
            cd ./terraform/<<parameters.environment>>/
            terraform plan
  terraform-init-then-apply:
    description: "Initializes and applies terraform configuration"
    parameters:
      environment:
        type: string
    steps:
      - *attach_workspace
      - checkout
      - terraform-init:
          environment: <<parameters.environment>>
      - run:
          name: apply
          command: |
            cd ./terraform/<<parameters.environment>>/
            terraform apply -auto-approve
  deploy-lambda:
    description: "Deploys API via Serverless"
    parameters:
      stage:
        type: string
    steps:
      - *attach_workspace
      - checkout
      - setup_remote_docker
      - run:
          name: Install Node.js
          command: |
            curl -sL https://deb.nodesource.com/setup_20.x | bash -
            apt-get update && apt-get install -y nodejs
      - run:
          name: Install serverless CLI
          command: npm i -g serverless
      - run:
          name: Build lambda
          command: |
            chmod +x ./build.sh
            ./build.sh
      - run:
          name: Deploy lambda
          command: |
            sls deploy --stage <<parameters.stage>> --conceal
  migrate-database:
    description: "Migrate database"
    parameters:
      stage:
        type: string
    steps:
      - *attach_workspace
      - checkout
      - setup_remote_docker
      - run:
          name: Install SSH client
          command: apt-get update && apt-get install -y openssh-client
      - run:
          name: Install Unzip
          command: apt-get update && apt-get install unzip
      - run:
          name: Install AWS CLI
          command: |
            curl -L -o awscliv2.zip "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip"
            unzip awscliv2.zip
            ./aws/install
      - run:
          name: Install Session Manager plugin
          command: |
            curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o "session-manager-plugin.deb"
            dpkg -i session-manager-plugin.deb
      - run:
          name: Install dotnet ef core
          command: dotnet tool install dotnet-ef --version 6.0.6 --tool-path ./dotnet-ef-local/
      - run:
          name: SSH into RDS and migrate database
          command: |
            aws ssm get-parameter --name "/platform-apis-jump-box-pem-key" --output text --query Parameter.Value > ./private-key.pem
            chmod 400 ./private-key.pem
            HOST=$(aws ssm get-parameter --name /addresses-api/<<parameters.stage>>/postgres-hostname --query Parameter.Value)
            PORT=$(aws ssm get-parameter --name /addresses-api/<<parameters.stage>>/postgres-port --query Parameter.Value)
            INSTANCE_NAME=$(aws ssm get-parameter --name /platform-apis-jump-box-instance-name --query Parameter.Value)
            ssh -4 -i ./private-key.pem -Nf -M -L 5432:${HOST//\"}:${PORT//\"} -o "UserKnownHostsFile=/dev/null" -o "StrictHostKeyChecking=no" -o ProxyCommand="aws ssm start-session --target %h --document AWS-StartSSHSession --parameters portNumber=%p --region=eu-west-2" ec2-user@${INSTANCE_NAME//\"}
            PASSWORD=$(aws ssm get-parameter --name /addresses-api/<<parameters.stage>>/postgres-password --query Parameter.Value)
            USERNAME=$(aws ssm get-parameter --name /addresses-api/<<parameters.stage>>/postgres-username --query Parameter.Value)
            CONN_STR="Host=localhost;Password=${PASSWORD};Port=5432;Username=${USERNAME};Database=addresses_api;CommandTimeout=120;"
            cd ./AddressesAPI/
            CONNECTION_STRING=${CONN_STR} ./../dotnet-ef-local/dotnet-ef database update

jobs:
  check-code-formatting:
    executor: docker-dotnet
    steps:
      - checkout
      - run:
          name: Install dotnet format
          command: dotnet tool install dotnet-format --tool-path ./dotnet-format-local/
      - run:
          name: Run formatter check
          command: ./dotnet-format-local/dotnet-format --check
  build-and-test:
    executor: docker-python
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: build
          command: docker-compose build addresses-api-test
      - run:
          name: Run tests
          command: |
            docker-compose up -d test-elasticsearch
            docker-compose run addresses-api-test
  assume-role-staging:
    executor: docker-python
    steps:
      - assume-role-and-persist-workspace:
          aws-account: $AWS_ACCOUNT_STAGING
  assume-role-production:
    executor: docker-python
    steps:
      - assume-role-and-persist-workspace:
          aws-account: $AWS_ACCOUNT_PRODUCTION
  preview-terraform-staging-changes:
    executor: docker-terraform
    steps:
      - terraform-preview:
          environment: "staging"
  preview-terraform-production-changes:
    executor: docker-terraform
    steps:
      - terraform-preview:
          environment: "production"
  terraform-init-and-apply-to-staging:
    executor: docker-terraform
    steps:
      - terraform-init-then-apply:
          environment: "staging"
  terraform-init-and-apply-to-production:
    executor: docker-terraform
    steps:
      - terraform-init-then-apply:
          environment: "production"
  deploy-to-development:
    executor: docker-dotnet
    steps:
      - deploy-lambda:
          stage: "development"
  deploy-to-staging:
    executor: docker-dotnet
    steps:
      - deploy-lambda:
          stage: "staging"
  deploy-to-production:
    executor: docker-dotnet
    steps:
      - deploy-lambda:
          stage: "production"

workflows:
  check-and-deploy-development:
    jobs:
      - check-code-formatting
      - build-and-test
  check-and-deploy-staging-and-production:
    jobs:
      - build-and-test:
          filters:
            branches:
              only: master
      - assume-role-staging:
          context: api-assume-role-staging-context
          requires:
            - build-and-test
          filters:
            branches:
              only: master
      - deploy-to-staging:
          context: "Serverless Framework"
          requires:
            - assume-role-staging
          filters:
            branches:
              only: master
      - permit-production-deployment-workflow:
          type: approval
          requires:
            - deploy-to-staging
          filters:
            branches:
              only: master
      - assume-role-production:
          context: api-assume-role-production-context
          requires:
            - permit-production-deployment-workflow
          filters:
            branches:
              only: master
      - deploy-to-production:
          context: "Serverless Framework"
          requires:
            - assume-role-production
          filters:
            branches:
              only: master

  deploy-staging-and-production-terraform:
    jobs:
      - permit-staging-and-production-terraform-workflow:
          type: approval
          filters:
            branches:
              only: master
      - assume-role-staging:
          context: api-assume-role-staging-context
          requires:
            - permit-staging-and-production-terraform-workflow
          filters:
            branches:
              only: master
      - preview-terraform-staging-changes:
          requires:
            - assume-role-staging
          filters:
            branches:
              only: master
      - continue-with-staging-terraform-release:
          type: approval
          requires:
            - preview-terraform-staging-changes
          filters:
            branches:
              only: master
      - terraform-init-and-apply-to-staging:
          requires:
            - continue-with-staging-terraform-release
          filters:
            branches:
              only: master
      - permit-production-terraform-workflow:
          type: approval
          requires:
            - terraform-init-and-apply-to-staging
          filters:
            branches:
              only: master
      - assume-role-production:
          context: api-assume-role-production-context
          requires:
            - permit-production-terraform-workflow
          filters:
            branches:
              only: master
      - preview-terraform-production-changes:
          requires:
            - assume-role-production
          filters:
            branches:
              only: master
      - continue-with-production-terraform-release:
          type: approval
          requires:
            - preview-terraform-production-changes
          filters:
            branches:
              only: master
      - terraform-init-and-apply-to-production:
          requires:
            - continue-with-production-terraform-release
          filters:
            branches:
              only: master
